server:
  port: ${SERVER_PORT:8443}
  ssl:
    enabled: true
    key-store: ${SSL_KEYSTORE:/app/certs/keystore.p12}
    key-store-password: ${SSL_KEYSTORE_PASSWORD:changeit}
    key-store-type: PKCS12
    key-alias: matching-service
    protocol: TLS
    enabled-protocols: TLSv1.2,TLSv1.3

spring:
  application:
    name: matching-service

  jackson:
    serialization:
      write-dates-as-timestamps: false

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5671}
    username: ${RABBITMQ_USER:adopti}
    password: ${RABBITMQ_PASSWORD:password}
    ssl:
      enabled: true
      algorithm: TLSv1.3
      trust-store: file:/app/certs/truststore.jks
      trust-store-password: ${SSL_TRUSTSTORE_PASSWORD:changeit}
      verify-hostname: true

elasticsearch:
  host: ${ELASTICSEARCH_HOST:localhost}
  port: ${ELASTICSEARCH_PORT:9200}
  scheme: ${ELASTICSEARCH_SCHEME:https}
  username: ${ELASTICSEARCH_USERNAME:elastic}
  password: ${ELASTICSEARCH_PASSWORD:}
  ca-path: ${ELASTICSEARCH_CA_PATH:/app/certs/ca.crt}
  index-name: ${ELASTICSEARCH_INDEX:pets}

matching:
  # Minimum score threshold (0.0 - 1.0) for a match to be considered
  score-threshold: ${MATCH_SCORE_THRESHOLD:0.3}
  # Maximum age of reports to consider for matching (in days)
  max-days: ${MATCH_MAX_DAYS:90}
  # Maximum number of matches to return per query
  max-results: ${MATCH_MAX_RESULTS:20}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.adopti: DEBUG
    co.elastic.clients: WARN
    org.springframework.amqp: INFO
